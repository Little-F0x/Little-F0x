name: Latest Blog Posts
on:
  schedule:
    # 每天 UTC 时间 00:00 运行（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Blog Post Workflow
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # ⚠️ 重要：请替换为你的 RSS 源 URL
          # 支持平台：微信公众号、知乎、个人博客、Medium、Dev.to 等
          feed_list: |
            # 示例：微信公众号 RSS（需在后台开启）
            # https://rsshub.app/wechat/feed/公众号ID

            # 示例：知乎专栏 RSS
            # https://rsshub.app/zhihu/people/activities/知乎用户ID

            # 示例：个人博客 RSS
            # https://blog.little-f0x.com/feed.xml

            # 当前占位符 - 替换为你的实际 RSS URL
            https://example.com/your-rss-feed.xml

          # 输出配置
          max_post_count: 5           # 显示最新 5 篇文章
          readme_path: ./README.md    # README 文件路径
          gh_token: ${{ secrets.GITHUB_TOKEN }}

          # 自定义模板
          comment_tag_name: "BLOG-POST-LIST"
          template: |
            ### 📝 最新文章 | Latest Posts
            ${{#posts}}
            - **[{{title}}]({{url}})** - {{date}}
            ${{/posts}}

            *[查看所有文章 →](https://blog.little-f0x.com)*

          # 日期格式
          date_format: "YYYY-MM-DD"

          # 排序方式：newest_first 或 oldest_first
          sort_by: "newest_first"

          # 失败处理
          fail_on_error: false

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📝 docs: 更新最新博客文章列表 [自动]"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
          commit_author: "GitHub Actions <actions@github.com>"
          branch: main